name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: team_rZnsi3AQcMmfqWqZGWMwHs1X
  VERCEL_PROJECT_ID: prj_HMg3NeE8ef9w83bp6ylmlZgjZ5jB

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.Vercel_link }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.Vercel_link }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.Vercel_link }}
